<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Dashboard{% endblock %} — Cat Food AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:#0f0f1a;color:#e0e0e0;display:flex;min-height:100vh}
        .sidebar{width:240px;background:linear-gradient(180deg,#1a1a2e 0%,#16213e 100%);border-right:1px solid rgba(255,255,255,.06);position:fixed;top:0;left:0;height:100vh;padding:24px 0;z-index:200;display:flex;flex-direction:column}
        .sidebar .logo{padding:0 24px 28px;border-bottom:1px solid rgba(255,255,255,.06)}
        .sidebar .logo h2{font-size:1.1rem;background:linear-gradient(135deg,#667eea,#764ba2);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        .sidebar .logo p{font-size:.65rem;color:#636e88;margin-top:4px}
        .sidebar nav{flex:1;padding:20px 12px}
        .sidebar nav a{display:flex;align-items:center;gap:12px;padding:12px 16px;margin-bottom:4px;border-radius:10px;color:#8892b0;text-decoration:none;font-size:.85rem;font-weight:500;transition:all .2s}
        .sidebar nav a:hover{background:rgba(102,126,234,.1);color:#fff}
        .sidebar nav a.active{background:linear-gradient(135deg,rgba(102,126,234,.2),rgba(118,75,162,.2));color:#fff;border:1px solid rgba(102,126,234,.3)}
        .sidebar nav a i{width:20px;text-align:center;font-size:.9rem}
        .main{margin-left:240px;flex:1;padding:30px;min-height:100vh}
        .page-header{margin-bottom:30px}
        .page-header h1{font-size:1.5rem;font-weight:700;color:#fff}
        .page-header p{font-size:.8rem;color:#636e88;margin-top:4px}
        .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:28px}
        .card{background:linear-gradient(145deg,#1a1a2e,#16213e);border:1px solid rgba(255,255,255,.06);border-radius:16px;padding:22px;transition:transform .2s}
        .card:hover{transform:translateY(-3px);box-shadow:0 8px 30px rgba(102,126,234,.12)}
        .card .icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1rem;margin-bottom:12px}
        .card .label{font-size:.7rem;color:#8892b0;text-transform:uppercase;letter-spacing:1px}
        .card .value{font-size:1.6rem;font-weight:800;background:linear-gradient(135deg,#667eea,#764ba2);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-top:2px}
        .card .sub{font-size:.65rem;color:#636e88;margin-top:2px}
        .icon-blue{background:rgba(102,126,234,.15);color:#667eea}
        .icon-green{background:rgba(0,184,148,.15);color:#00b894}
        .icon-purple{background:rgba(108,92,231,.15);color:#6c5ce7}
        .icon-orange{background:rgba(253,203,110,.15);color:#fdcb6e}
        .icon-red{background:rgba(255,118,117,.15);color:#ff7675}
        .icon-pink{background:rgba(232,67,147,.15);color:#e84393}
        .section-title{font-size:1.1rem;font-weight:700;margin:28px 0 16px;padding-left:12px;border-left:4px solid #667eea;color:#fff}
        .grid-2{display:grid;grid-template-columns:repeat(auto-fit,minmax(500px,1fr));gap:18px;margin-bottom:24px}
        .box{background:linear-gradient(145deg,#1a1a2e,#16213e);border:1px solid rgba(255,255,255,.06);border-radius:16px;padding:22px;overflow:hidden}
        .box h3{font-size:.9rem;font-weight:600;color:#fff;margin-bottom:14px;display:flex;align-items:center;gap:8px}
        .box img{width:100%;border-radius:8px}
        .box p.desc{font-size:.72rem;color:#636e88;margin-top:2px;margin-bottom:10px}
        table.data-table{width:100%;border-collapse:separate;border-spacing:0;background:linear-gradient(145deg,#1a1a2e,#16213e);border-radius:16px;overflow:hidden;border:1px solid rgba(255,255,255,.06);margin-bottom:24px}
        table.data-table th{background:rgba(102,126,234,.1);padding:12px 16px;text-align:left;font-size:.75rem;text-transform:uppercase;letter-spacing:1px;color:#8892b0;font-weight:600}
        table.data-table td{padding:12px 16px;border-top:1px solid rgba(255,255,255,.04);font-size:.85rem}
        .badge-best{background:linear-gradient(135deg,#00b894,#00cec9);color:#fff;padding:2px 10px;border-radius:10px;font-size:.65rem;font-weight:700;margin-left:6px}
        .persona-card{background:linear-gradient(145deg,#1a1a2e,#16213e);border:1px solid rgba(255,255,255,.06);border-radius:16px;padding:24px;margin-bottom:16px}
        .persona-card h3{font-size:1rem;font-weight:700;color:#fff;margin-bottom:8px}
        .persona-card .tag{display:inline-block;padding:3px 10px;border-radius:8px;font-size:.7rem;font-weight:600;margin-right:6px;margin-bottom:4px}
        .persona-card .detail{font-size:.8rem;color:#8892b0;line-height:1.8}
        .tag-0{background:rgba(102,126,234,.2);color:#667eea}
        .tag-1{background:rgba(0,184,148,.2);color:#00b894}
        .tag-2{background:rgba(225,112,85,.2);color:#e17055}
        .bar{height:5px;background:rgba(255,255,255,.06);border-radius:3px;overflow:hidden;margin:4px 0}
        .bar .fill{height:100%;background:linear-gradient(90deg,#667eea,#764ba2);border-radius:3px}
        .mini-chart{height:200px}
        footer{text-align:center;padding:24px;color:#4a5568;font-size:.7rem;border-top:1px solid rgba(255,255,255,.04);margin-top:30px}
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>

<aside class="sidebar">
    <div class="logo">
        <h2><i class="fas fa-cat"></i> Cat Food AI</h2>
        <p>Packaging Survey Dashboard</p>
    </div>
    <nav>
        <a href="/" class="{{ 'active' if request.endpoint == 'home' }}"><i class="fas fa-home"></i> Home</a>
        <a href="/unsupervised" class="{{ 'active' if request.endpoint == 'unsupervised' }}"><i class="fas fa-project-diagram"></i> Unsupervised</a>
        <a href="/supervised" class="{{ 'active' if request.endpoint == 'supervised' }}"><i class="fas fa-brain"></i> Supervised</a>
        <a href="/business" class="{{ 'active' if request.endpoint == 'business' }}"><i class="fas fa-chart-pie"></i> Business Insight</a>
    </nav>
</aside>

<main class="main">
    {% block content %}{% endblock %}
    <footer><p>Cat Food Packaging Survey &copy; 2024 | Database: SQLite | ML: scikit-learn</p></footer>
</main>

<script>
    Chart.defaults.color = '#8892b0';
    Chart.defaults.borderColor = 'rgba(255,255,255,0.04)';
    Chart.defaults.font.family = 'Inter';
</script>
{% block extra_js %}{% endblock %}
</body>
</html>
